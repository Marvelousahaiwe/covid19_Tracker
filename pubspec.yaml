name: e_health
description: "COVID-19 Tracker Dashboard — Clean Architecture, BLoC, Dio."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # Networking
  dio: ^5.7.0

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Charts
  fl_chart: ^0.70.2

  # Utilities
  intl: ^0.19.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
